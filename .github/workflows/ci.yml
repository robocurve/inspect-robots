name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint · type · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags for versioning

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy

      - name: Pytest
        run: pytest --cov --cov-report=term-missing

  core-only-import:
    # Enforce the dependency boundary: the core package must import with ONLY
    # numpy installed — no rerun, no torch, no optional extras.
    name: core-only import (no rerun/torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install core only (no extras)
        run: uv pip install --system -e .

      - name: Assert optional deps are absent, then import
        run: |
          python - <<'PY'
          import importlib.util
          for mod in ("rerun", "torch"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import robolens
          print("robolens", robolens.__version__, "imported with core deps only")
          PY
