name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + strict typing, once, on a single interpreter. (mypy targets the 3.10
  # floor via pyproject; running it on 3.11 avoids NumPy's 3.12-only stub syntax.)
  quality:
    name: lint · type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags for versioning
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.11
      - name: Install (dev extras)
        run: uv pip install -e ".[dev]"
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy

  # Blocking test gate across the supported OS x Python matrix.
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install (dev extras)
        run: uv pip install -e ".[dev]"
      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing

  # Non-blocking: extra Python versions, Windows, and the NumPy floor.
  test-extra:
    name: extra (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.numpy }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            numpy: "numpy>=1.24,<2"
          - os: ubuntu-latest
            python-version: "3.13"
            numpy: "numpy>=2"
          - os: windows-latest
            python-version: "3.12"
            numpy: "numpy>=2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install (dev extras) with pinned NumPy
        run: |
          uv pip install -e ".[dev]"
          uv pip install "${{ matrix.numpy }}"
      - name: Pytest
        run: uv run pytest -q

  core-only-import:
    # Enforce the dependency boundary: the core package must import with ONLY
    # numpy installed — no rerun, no torch, no optional extras.
    name: core-only import (no rerun/torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.12
      - name: Install core only (no extras)
        run: uv pip install -e .
      - name: Assert optional deps are absent, then import
        run: |
          uv run python - <<'PY'
          import importlib.util
          for mod in ("rerun", "torch"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import inspect_robots
          print("inspect_robots", inspect_robots.__version__, "imported with core deps only")
          PY

  # First-party plugins under plugins/* are their own packages with their own
  # tests and coverage scope (NOT part of the core 100% gate). The Isaac adapter's
  # suite runs WITHOUT Isaac installed: it covers spaces/semantics, protocol
  # conformance, registry discovery, compatibility, memory-safety, and the
  # clear-error path when Isaac is absent.
  plugin-isaacsim:
    name: plugin · isaacsim (no Isaac)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Sync workspace (core + plugins, dev extras)
        run: uv sync --python 3.11 --all-packages --extra dev
      - name: Ruff (plugin)
        run: uv run --no-sync ruff check plugins/inspect-robots-isaacsim
      - name: Mypy (plugin, strict)
        run: >
          uv run --no-sync mypy
          --config-file plugins/inspect-robots-isaacsim/pyproject.toml
          plugins/inspect-robots-isaacsim/src/inspect_robots_isaacsim
      - name: Pytest (plugin)
        run: uv run --no-sync python -m pytest plugins/inspect-robots-isaacsim/tests -q

  # Single required status check for branch protection: green iff every job
  # above is green. Add new jobs to 'needs' here or they won't gate merges.
  ci-ok:
    name: ci-ok
    if: ${{ always() }}
    needs: [quality, test, test-extra, core-only-import, plugin-isaacsim]
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every needed job succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: echo "$RESULTS" | jq -e 'all(.[]; .result == "success")'

  # Red main is a stop-the-line event: open an issue so it can't go unnoticed.
  # Only fires on pushes (i.e. merges to main), never on PR runs.
  alert-red-main:
    name: alert on red main
    if: ${{ failure() && github.event_name == 'push' }}
    needs: [quality, test, test-extra, core-only-import, plugin-isaacsim]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open an issue unless one is already open
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --search "CI is red on main in:title" --json number --jq length)
          if [ "$existing" = "0" ]; then
            gh issue create -R "$GITHUB_REPOSITORY"               --title "CI is red on main (${GITHUB_SHA:0:8})"               --body "CI failed on a push to main: $RUN_URL

Stop-the-line: fix forward or revert before merging anything else. If the failure is transient (network, external deps), re-run the failed jobs and close this."
          else
            echo "an open red-main issue already exists; not filing another"
          fi
